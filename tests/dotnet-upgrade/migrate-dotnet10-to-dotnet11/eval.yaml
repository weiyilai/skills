name: migrate-dotnet10-to-dotnet11
description: Evaluates the dotnet-upgrade/migrate-dotnet10-to-dotnet11 skill
type: capability
config:
  timeout: 3m
stimuli:
  - name: Console app with compression and TAR operations
    prompt: >
      Help me migrate my .NET 10 console app to .NET 11. The app:

      - Creates GZipStream to compress data, then checks if the output is empty (zero bytes) to detect "no data"
      scenarios

      - Reads TAR archives that were hand-crafted by a legacy tool (some may have invalid checksums)

      - Uses ZipArchive.CreateAsync for large ZIP files and relies on lazy loading behavior

      - Uses MemoryStream with very large allocations close to the maximum capacity

      What breaks when migrating to .NET 11?
    graders:
      - type: exit-success
      - type: output-matches
        config:
          pattern: (GZipStream|DeflateStream|header|footer|empty)
      - type: output-matches
        config:
          pattern: (TAR|checksum|verify|validation)
      - type: output-matches
        config:
          pattern: (ZipArchive|CreateAsync|eager)
      - type: prompt
    rubric:
      - Explains GZipStream/DeflateStream now writes headers and footers even for empty payloads; zero-length check
        needs updating
      - Warns TAR-reading APIs now verify header checksums; corrupted or hand-crafted TAR files may fail
      - Notes ZipArchive.CreateAsync now eagerly loads entries, potentially affecting memory usage
      - Mentions MemoryStream maximum capacity update and changed exception behavior
  - name: C# 15 compiler breaking changes — Span safe-context, nameof, with()
    prompt: |
      I'm migrating a .NET 10 library to .NET 11 / C# 15 and getting new compiler errors. Here's the code:

      ```csharp
      // SpanHelper.cs
      public static int[] ProcessItems(int[] source)
      {
          scoped Span<int> results = default;
          foreach (var x in source)
          {
              Span<int> items = [x * 2];
              results = items;  // worked in C# 14
          }
          return results.ToArray();
      }
      ```

      ```csharp
      // Metadata.cs
      class MyService
      {
          string Endpoint;
          [System.Obsolete(nameof(this.Endpoint))]
          void LegacyConnect() { }
      }
      ```

      ```csharp
      // Pipeline.cs
      object with(object a, object b) => (a, b);
      object[] items = [with(x, y), z];  // worked in C# 14
      ```

      What breaks in each case and how do I fix it?
    graders:
      - type: exit-success
      - type: output-matches
        config:
          pattern: (Span|safe.context|declaration.block|scope)
      - type: output-matches
        config:
          pattern: (nameof|this\.|attribute)
      - type: output-matches
        config:
          pattern: (with|collection expression|@with|constructor)
      - type: prompt
    rubric:
      - Identifies the Span collection expression safe-context change to declaration-block; recommends using array type
        or moving expression to outer scope
      - Identifies nameof(this.Endpoint) is now disallowed in attributes; recommends nameof(Endpoint)
      - Explains with() in collection expressions is now treated as constructor arguments in C# 15; recommends @with()
        to call the method
  - name: EF Core app with Cosmos DB provider using sync APIs
    prompt: |
      I'm migrating a .NET 10 web API to .NET 11. The app uses EF Core with the Azure Cosmos DB provider.
      We have a repository pattern where some methods use synchronous LINQ:

      ```csharp
      public class ProductRepository
      {
          private readonly CosmosDbContext _context;

          public List<Product> GetAll()
          {
              return _context.Products.ToList();
          }

          public Product GetById(int id)
          {
              return _context.Products.First(p => p.Id == id);
          }

          public int GetCount()
          {
              return _context.Products.Count();
          }

          public void Save(Product product)
          {
              _context.Products.Add(product);
              _context.SaveChanges();
          }
      }
      ```

      In .NET 10 we had the sync-over-async opt-in configured. What breaks in .NET 11?
    graders:
      - type: exit-success
      - type: output-matches
        config:
          pattern: (sync|async|ToList|SaveChanges)
      - type: output-matches
        config:
          pattern: (Cosmos|always throws|no.*opt.in|removed)
      - type: prompt
    rubric:
      - Identifies that sync I/O via Cosmos DB provider is fully removed in EF Core 11 with no opt-in
      - "Recommends converting all sync methods to async: ToList→ToListAsync, First→FirstAsync, Count→CountAsync,
        SaveChanges→SaveChangesAsync"
      - Notes the methods must return Task<T> and the callers must be updated to await
  - name: Deployment to older hardware with minimum requirement changes
    prompt: |
      We're upgrading our .NET 10 microservices to .NET 11. We deploy to:
      - x86-64 Linux containers on a mix of hardware, some dating back to 2012
      - Windows Arm64 devices (Surface Pro X with SQ1 chip)
      - Raspberry Pi 4 running Linux for edge computing
      After upgrading, one of our Linux x86 nodes fails with "The current CPU is missing
      one or more of the baseline instruction sets." What's happening?
    graders:
      - type: exit-success
      - type: output-matches
        config:
          pattern: (x86.64.v2|baseline|minimum|hardware)
      - type: output-matches
        config:
          pattern: (SSE4|POPCNT|SSSE3)
      - type: prompt
    rubric:
      - Explains .NET 11 raised the x86/x64 minimum from x86-64-v1 to x86-64-v2, requiring SSE4.1, SSE4.2, POPCNT, etc.
      - Notes hardware from 2012 may lack x86-64-v2 support — need to upgrade or keep on .NET 10
      - Confirms Raspberry Pi 4 (Arm64 Linux) is still supported — no change to Linux Arm64 minimum
      - Notes Surface Pro X (SQ1) supports LSE so Windows Arm64 requirement is met
  - name: Cryptography app using DSA on macOS
    prompt: |
      We have a .NET 10 library that verifies legacy DSA signatures. It runs on Linux, Windows,
      and macOS. After upgrading to .NET 11, the macOS builds fail at runtime when calling
      DSA.Create(). What happened and how do we fix it?
    graders:
      - type: exit-success
      - type: output-matches
        config:
          pattern: (DSA|macOS|removed)
      - type: output-matches
        config:
          pattern: (ECDSA|RSA|alternative|replacement)
      - type: prompt
    rubric:
      - Explains DSA has been removed from macOS in .NET 11
      - Notes DSA still works on Windows and Linux
      - Recommends migrating to ECDSA or RSA
  - name: Basic TFM update with Docker and global.json
    prompt: |
      I have a .NET 10 ASP.NET Core web app with:
      - TargetFramework set to net10.0 in the csproj
      - global.json pinning SDK to 10.0.100
      - A Dockerfile using mcr.microsoft.com/dotnet/aspnet:10.0 and sdk:10.0
      How do I update everything for .NET 11?
    graders:
      - type: exit-success
      - type: output-matches
        config:
          pattern: (net11\.0|TargetFramework)
      - type: output-matches
        config:
          pattern: (global\.json|11\.0)
      - type: output-matches
        config:
          pattern: (Dockerfile|sdk:11\.0|aspnet:11\.0)
      - type: prompt
    rubric:
      - Updates TargetFramework from net10.0 to net11.0
      - Updates global.json SDK version to 11.0.x
      - Updates Dockerfile base images from 10.0 to 11.0
      - Recommends updating Microsoft.* package references to 11.0.x versions
  - name: C# 15 dynamic operator and ref readonly delegate issues
    prompt: |
      After upgrading to .NET 11 / C# 15, I'm getting two new compiler errors:

      ```csharp
      // DynamicOps.cs
      interface IFilter
      {
          static bool operator true(IFilter x) => true;
          static bool operator false(IFilter x) => false;
      }

      class CompositeFilter : IFilter
      {
          public static CompositeFilter operator &(CompositeFilter x, CompositeFilter y) => x;
          public static bool operator true(CompositeFilter x) => true;
          public static bool operator false(CompositeFilter x) => false;
      }

      void Apply(IFilter left, dynamic right)
      {
          var combined = left && right;  // error!
      }
      ```

      ```csharp
      // RefHelper.cs
      class RefHelper
      {
          private static int value = 42;

          public static void M()
          {
              var fn = ref readonly int () => ref value;  // error CS0518
          }
      }
      ```

      What's happening?
    graders:
      - type: exit-success
      - type: output-matches
        config:
          pattern: (interface|dynamic|CS7083|operator)
      - type: output-matches
        config:
          pattern: (ref readonly|InAttribute|CS0518)
      - type: prompt
    rubric:
      - Explains that interface types as left operand of && with dynamic right operand now produces CS7083 at compile
        time
      - Recommends casting to concrete type or to dynamic
      - Explains ref readonly delegate synthesis requires InAttribute; recommends ensuring proper assembly references
  - name: BackgroundService exceptions and ZipArchive CRC32 validation
    prompt: >
      I'm migrating a .NET 10 worker service to .NET 11. The app has several
      BackgroundService implementations. One of them occasionally throws exceptions
      in ExecuteAsync() — we were relying on the host silently ignoring those
      failures and continuing to run. It also reads ZIP archives uploaded by users,
      and some of those archives are truncated or partially corrupt — that worked
      fine before. What breaks in .NET 11?
    graders:
      - type: exit-success
      - type: output-matches
        config:
          pattern: (BackgroundService|ExecuteAsync|exception|host|stop|crash)
      - type: output-matches
        config:
          pattern: (ZipArchive|CRC32|InvalidDataException|checksum)
      - type: prompt
    rubric:
      - Explains that unhandled BackgroundService exceptions now propagate and stop the host; recommends adding
        try/catch in ExecuteAsync()
      - Explains ZipArchive now validates CRC32 checksums; corrupt or truncated archives throw InvalidDataException
  - name: EF Core SQL Server with Entra ID auth and Design package dependency
    prompt: |
      We're upgrading a .NET 10 web API to .NET 11. The project uses EF Core with SQL Server
      and connects via Entra ID managed identity (ActiveDirectoryManagedIdentity in the
      connection string). We also use `dotnet ef` CLI tooling — it was working before with
      just the Microsoft.EntityFrameworkCore.Tools package reference.

      After upgrading all packages to 11.0.x, `dotnet ef migrations add` fails saying it
      can't find design-time services, and the app throws at runtime when trying to connect
      to SQL Server. What changed?
    graders:
      - type: exit-success
      - type: output-matches
        config:
          pattern: (SqlClient|7\.0|Entra|Azure|authentication)
      - type: output-matches
        config:
          pattern: (Design|Tools|transitive|explicit)
      - type: prompt
    rubric:
      - Explains Microsoft.Data.SqlClient updated to 7.0 and Entra ID auth dependencies were removed from the core
        package; recommends adding Microsoft.Data.SqlClient.Extensions.Azure
      - Explains EF Core Tools no longer transitively depends on Design; recommends adding explicit PackageReference
        for Microsoft.EntityFrameworkCore.Design
  - name: ASP.NET Core app with OpenAPI customizations and Blazor Virtualize
    prompt: |
      I'm upgrading a .NET 10 ASP.NET Core app to .NET 11. The app:
      - Uses Microsoft.AspNetCore.OpenApi with custom document transformers that directly
        manipulate OpenApiDocument and OpenApiSchema objects from the Microsoft.OpenApi library
      - Has a Blazor Server component using <Virtualize> for rendering a large product list
        without explicitly setting OverscanCount

      After upgrading to .NET 11, I'm getting compile errors in the OpenAPI transformer code.
      Also wondering if the Blazor component behavior will change. What's going on?
    graders:
      - type: exit-success
      - type: output-matches
        config:
          pattern: (OpenApi|Microsoft\.OpenApi|v3|3\.2|upgrade)
      - type: output-matches
        config:
          pattern: OverscanCount.*(3|15)
      - type: prompt
    rubric:
      - Explains Microsoft.OpenApi updated from v2 to v3 with breaking API changes; recommends following the v3
        upgrade guide
      - Notes the Virtualize default OverscanCount changed from 3 to 15; recommends setting OverscanCount explicitly
        if performance matters
  - name: mTLS and AIA certificate chain validation
    prompt: >
      We have a .NET 10 gRPC service that uses mutual TLS. The server validates client
      certificates. The client certificates are signed by an intermediate CA that is not
      installed on the server — instead, the certificates include an AIA extension that
      points to the intermediate CA's URL. This worked in .NET 10 but after upgrading to
      .NET 11, client certificate validation fails. What happened?
    graders:
      - type: exit-success
      - type: output-matches
        config:
          pattern: (AIA|certificate|download|disabled|chain)
      - type: prompt
    rubric:
      - Explains AIA certificate downloads are now disabled by default during client-certificate validation
      - Recommends pre-installing the full certificate chain, having clients send intermediates, or re-enabling
        AIA downloads via X509ChainPolicy
