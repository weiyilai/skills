      <PublishTrimmed>true</PublishTrimmed>
      ```

      What breaks in each case and how do I fix it? Note: the app also uses HTTP/3 to connect to our backend.
    graders:
      - type: output-matches
        config:
          pattern: (shift|mask|generic math|IShiftOperators|byte|sizeof)
      - type: output-matches
        config:
          pattern: (streaming|synchronous|Read|browser|HttpClient|async)
      - type: output-matches
        config:
          pattern: (HTTP/3|trim|PublishTrimmed|Http3Support)
      - type: prompt
    rubric:
      - Explains that shift operations now consistently mask the shift amount; for byte, 8 & 7 = 0, so shifting by 8
        always returns 0
      - Identifies the synchronous stream.Read() now throws because browser streaming is enabled by default; must use
        ReadAsync or disable streaming
      - Notes PaxTarEntry no longer auto-populates atime/ctime; set them explicitly
      - Notes HTTP/3 is disabled when PublishTrimmed is set; fix by adding <Http3Support>true</Http3Support> — this is
        NOT a native library issue, it's the trimmer removing HTTP/3 code
