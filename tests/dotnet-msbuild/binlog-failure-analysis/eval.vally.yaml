name: binlog-failure-analysis
description: Evaluates the dotnet-msbuild/binlog-failure-analysis skill
type: capability
config:
  timeout: 6m
stimuli:
  - name: Diagnose build failures from binlog only (no source files)
    prompt: A .NET solution build has failed. The binary log from the failed build is available at build.binlog in the
      current directory. You do NOT have access to the original source files — only the binlog. Analyze this binlog file
      to diagnose all build failures, identify which errors are root causes versus cascading failures from dependent
      project failures, and suggest targeted fixes for each root cause.
    environment:
      files:
        - src: .
          dest: .
      commands:
        # The solution is intentionally broken (missing Newtonsoft.Json reference), so
        # `dotnet build` exits non-zero. `-bl` still writes the binlog regardless, so
        # tolerate the failure. The .NET skill-validator ignores setup exit codes (it
        # never checks ExitCode), but vally's `experiment run` harness treats a non-zero
        # setup command as a fatal trial error and drops all events. `|| exit 0` swallows
        # the failure portably: `true` is not a cmd.exe builtin (vally shells out via
        # `cmd /c` on Windows), whereas `exit 0` returns 0 in both cmd and POSIX sh, so
        # the eval works on Linux CI, Windows local runs, and the skill-validator alike.
        - dotnet build BuildDiag.sln -bl:build.binlog || exit 0
        # Strip all source so the agent must diagnose from build.binlog alone. Keep
        # *.binlog AND any staged skill directory: vally copies environment.skills into
        # the workdir as <skill>/ (with SKILL.md) BEFORE running these setup commands, so
        # a naive "delete everything except *.binlog" wipes the skill and the skilled
        # variant aborts with "contains no SKILL.md". Excluding SKILL.md-bearing dirs is a
        # harmless no-op for the baseline variant (no skill staged) and the skill-validator.
        - node -e "const fs=require('fs'),p=require('path'); fs.readdirSync('.').filter(f=>!f.endsWith('.binlog')
          && !fs.existsSync(p.join(f,'SKILL.md'))).forEach(f=>fs.rmSync(f,{recursive:true,force:true}))"
    graders:
      - type: output-contains
        config:
          substring: CS0246
      - type: output-contains
        config:
          substring: Newtonsoft.Json
      - type: prompt
    rubric:
      - Successfully replayed the binary log to text logs or otherwise extracted errors from the binlog
      - Identified CS0246 compiler errors in the Services project for Newtonsoft.Json types (JsonConvert, JObject,
        Formatting) from the binlog
      - Correctly determined that the root cause is a missing PackageReference for Newtonsoft.Json in the Services
        project
      - "Recognized the cascading failure chain: Services failed → Api could not build because it depends on Services"
      - Suggested adding a PackageReference for Newtonsoft.Json to the Services project as the primary fix
