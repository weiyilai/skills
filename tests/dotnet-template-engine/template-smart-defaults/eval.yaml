name: template-smart-defaults
description: Evaluates the dotnet-template-engine/template-smart-defaults skill
type: capability
config:
  timeout: 3m
stimuli:
  - name: AOT implies a compatible framework
    prompt: "Create a native AOT worker service. I haven't picked a target framework — choose an appropriate one for me and explain why. Don't write any files yet, just tell me the parameters you'd use."
    graders:
      - type: exit-success
      - type: output-matches
        config:
          pattern: (?i)(aot)
      - type: output-matches
        config:
          pattern: (?i)net(8|9|10)\.0
      - type: output-matches
        config:
          pattern: (?i)dotnet new \w
      - type: output-matches
        config:
          pattern: \|.*\|
      - type: prompt
    rubric:
      - The agent recognized that requesting native AOT also requires choosing a compatible target framework
      - Because AOT was requested, the agent also selected a target framework
      - The agent chose a current, AOT-capable framework rather than an arbitrary one
      - The agent explained why native AOT requires a suitable target framework
    constraints:
      expect_tools:
        - skill
  - name: Auth implies HTTPS stays enabled
    prompt: "I want to create a webapi with Individual authentication. Give me the exact `dotnet new` command you'd run, then a brief explanation. Don't create anything yet."
    graders:
      - type: exit-success
      - type: output-matches
        config:
          pattern: (?i)individual
      - type: output-not-matches
        config:
          pattern: (?i)dotnet new[^\n]*--no-https
      - type: output-matches
        config:
          pattern: (?i)dotnet new \w
      - type: output-matches
        config:
          pattern: \|.*\|
      - type: prompt
    rubric:
      - The agent gave a concrete `dotnet new` command for a webapi with Individual authentication
      - Because auth is not None, the agent did NOT add a --no-https flag
      - The agent explained that authentication flows require HTTPS
      - The agent made clear which parameter values it chose and why
    constraints:
      expect_tools:
        - skill
  - name: Controllers exclude the minimal-API flag
    prompt: "Create a web API that uses controllers. Give me the exact `dotnet new` command you'd run, then explain. Do not create files."
    graders:
      - type: exit-success
      - type: output-matches
        config:
          pattern: (?i)(use-controllers|controllers)
      - type: output-not-matches
        config:
          pattern: (?i)dotnet new[^\n]*--[a-z-]*minimal
      - type: output-matches
        config:
          pattern: (?i)dotnet new \w
      - type: output-matches
        config:
          pattern: \|.*\|
      - type: prompt
    rubric:
      - The agent gave a concrete `dotnet new` command for a controller-based web API
      - The agent passed the controllers flag
      - The agent did NOT also pass a minimal-API flag (the two are mutually exclusive)
      - The agent explained the reasoning
    constraints:
      expect_tools:
        - skill
  - name: Never override an explicit user value
    prompt: "Create a native AOT console app, but I specifically want it targeting net8.0 — keep it on net8.0 no matter what. Give me the exact `dotnet new` command you'd run and the parameters you'd use."
    graders:
      - type: exit-success
      - type: output-contains
        config:
          substring: net8.0
      - type: output-not-matches
        config:
          pattern: (?i)dotnet new[^\n]*--framework[ =]+net(9|10)\.0
      - type: output-matches
        config:
          pattern: (?i)dotnet new \w
      - type: output-matches
        config:
          pattern: \|.*\|
      - type: prompt
    rubric:
      - The agent gave a concrete `dotnet new` command targeting net8.0 for the native AOT console app
      - The agent respected the explicit net8.0 framework the user set
      - The agent did NOT override the user value with a newer framework despite AOT being requested
      - The agent explained that it kept the user's explicit choice and only filled unset parameters
    constraints:
      expect_tools:
        - skill
