scenarios:
  - name: "Create a console application"
    prompt: "Create a new .NET console application called MyConsoleApp in the ./test-output directory"
    assertions:
      - type: "exit_success"
      - type: "output_contains"
        value: "MyConsoleApp"
      - type: "file_exists"
        path: "test-output/MyConsoleApp/MyConsoleApp.csproj"
    rubric:
      - "The agent created the requested console project"
      - "The agent created it at the requested ./test-output path"
      - "The resulting project is a valid console application"
    expect_tools:
      - skill
    timeout: 180
