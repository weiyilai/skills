name: grade-tests
description: Evaluates the dotnet-test/grade-tests skill
type: capability
config:
  timeout: 5m
stimuli:
  - name: Grade a curated list of mixed-quality MSTest methods
    prompt: |
      Grade these test methods individually and return a compact markdown table
      with one row per test, a letter grade, score band, and one-line note. Do
      not modify files.

      - OrderService.Tests.OrderProcessorTests.PlaceOrder_ValidItems_AssignsOrderIdAndPersistsOrder
      - OrderService.Tests.OrderProcessorTests.GetOrderById_ExistingId_ReturnsOrder
      - OrderService.Tests.OrderProcessorTests.CancelOrder_ExistingOrder_Works
      - OrderService.Tests.OrderProcessorTests.Test1
    environment:
      files:
        - src: fixtures/mixed-quality/OrderService.Tests/OrderService.Tests.csproj
          dest: OrderService.Tests/OrderService.Tests.csproj
        - src: fixtures/mixed-quality/OrderService.Tests/OrderProcessorTests.cs
          dest: OrderService.Tests/OrderProcessorTests.cs
    graders:
      - type: output-matches
        config:
          pattern: \|\s*Test\s*\|\s*Grade\s*\|
      - type: output-matches
        config:
          pattern: PlaceOrder_ValidItems_AssignsOrderIdAndPersistsOrder.*\|\s*A\s*\|
      - type: output-matches
        config:
          pattern: GetOrderById_ExistingId_ReturnsOrder.*\|\s*C\s*\|
      - type: output-matches
        config:
          pattern: CancelOrder_ExistingOrder_Works.*\|\s*F\s*\|
      - type: output-matches
        config:
          pattern: Test1.*\|\s*F\s*\|
      - type: exit-success
      - type: prompt
    rubric:
      - Produced one compact table row for every requested test with grade, score band, and a specific note
      - Graded the valid PlaceOrder test as A because it has clear structure and meaningful state and interaction assertions
      - Graded GetOrderById as C because its only assertion is a trivial non-null check
      - Graded CancelOrder as F because it contains no assertion
      - Graded Test1 as F because it combines weak naming, magic values, and a swallowed exception that hides assertion failures
    constraints:
      reject_tools:
        - edit
        - create
  - name: Ask for a bounded list instead of grading the workspace
    prompt: Grade my tests.
    environment:
      files:
        - src: fixtures/no-list-provided/Some.Tests/Some.Tests.csproj
          dest: Some.Tests/Some.Tests.csproj
        - src: fixtures/no-list-provided/Some.Tests/AccountTests.cs
          dest: Some.Tests/AccountTests.cs
        - src: fixtures/no-list-provided/Some.Tests/InvoiceTests.cs
          dest: Some.Tests/InvoiceTests.cs
        - src: fixtures/no-list-provided/Some.Tests/ReportingTests.cs
          dest: Some.Tests/ReportingTests.cs
    graders:
      - type: output-matches
        config:
          pattern: (specific|explicit|which tests|file paths|diff|scope)
      - type: exit-success
      - type: prompt
    rubric:
      - Asked for an explicit method list, file scope, or diff instead of silently grading the entire workspace
      - Did not produce invented grades for the available test files
      - Redirected suite-wide auditing to a suitable analysis skill or agent
    constraints:
      reject_tools:
        - edit
        - create
